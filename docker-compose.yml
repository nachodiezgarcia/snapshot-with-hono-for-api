services:
  api:
    build: ./apps/api
    ports: ["3001:3001"]
    environment:
      CONTENT_ISLAND_ACCESS_TOKEN: ${CONTENT_ISLAND_ACCESS_TOKEN}
      CONTENT_ISLAND_READ_TOKEN: ${CONTENT_ISLAND_READ_TOKEN}
      REFRESH_SECRET: ${REFRESH_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 5s
      retries: 5
  web:
    build: ./apps/web
    ports: ["3000:3000"]
    environment:
      PUBLIC_API_BASE_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy